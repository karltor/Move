name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needs write access to push the built site to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      # .nojekyll stops GitHub from running Jekyll over the built files.
      - run: touch dist/.nojekyll
      # Publishes the COMPILED site (dist/) to the gh-pages branch. That branch
      # contains real HTML/JS referencing /Move/assets/* — no src/main.tsx.
      - name: Publish dist/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
